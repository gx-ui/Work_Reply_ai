name: agent-team-ci

on:
  push:
    paths:
      - "agent/**"
      - "prompt/**"
      - "tests/**"
      - ".github/workflows/agent-team-ci.yml"
  pull_request:
    paths:
      - "agent/**"
      - "prompt/**"
      - "tests/**"
      - ".github/workflows/agent-team-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run pytest with 100% coverage gate
        run: |
          pytest tests/test_agent_team_refactor.py \
            --maxfail=1 \
            --disable-warnings \
            --cov=agent.summary_agent \
            --cov=agent.work_reply_agent \
            --cov=agent.work_reply_team \
            --cov=prompt.summary_agent_prompt \
            --cov=prompt.work_reply_agent_prompt \
            --cov-report=term-missing \
            --cov-fail-under=100
